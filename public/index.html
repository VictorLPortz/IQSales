<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQSales - Sammenlign forsikringer</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F3EF;
  --surface:#fff;
  --border:#E3E1D9;
  --text:#141412;
  --muted:#7A7870;
  --accent:#0A2540;
  --accent2:#1B7F4F;
  --accent-light:#E6F2EC;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  padding:2rem;
  max-width:960px;
  margin:0 auto;
}

.card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:1.5rem;
  margin-bottom:1.25rem;
  transition:all 0.3s ease;
}

.section-lbl{
  font-size:11px;
  font-weight:600;
  color:var(--muted);
  text-transform:uppercase;
  letter-spacing:.07em;
  margin-bottom:12px;
}

/* Type grid */
.type-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
}
.type-btn{
  padding:12px 6px;
  font-size:12px;
  font-weight:500;
  border:2px solid var(--border);
  border-radius:10px;
  cursor:pointer;
  color:var(--muted);
  background:var(--surface);
  transition:all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  text-align:center;
  position:relative;
  overflow:hidden;
}
.type-btn::before{
  content:'';
  position:absolute;
  top:0;
  left:0;
  right:0;
  bottom:0;
  background:linear-gradient(135deg, rgba(27,127,79,0.1) 0%, rgba(27,127,79,0) 100%);
  opacity:0;
  transition:opacity 0.3s;
}
.type-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(27,127,79,0.15);
  border-color:var(--accent2);
}
.type-btn:hover::before{
  opacity:1;
}
.type-btn.selected{
  background:linear-gradient(135deg, #1B7F4F 0%, #0F6E56 100%);
  color:#fff;
  border-color:#1B7F4F;
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(27,127,79,0.3);
}
.type-icon{
  font-size:20px;
  display:block;
  margin-bottom:4px;
  filter:grayscale(0.3);
}
.type-btn.selected .type-icon{
  filter:grayscale(0);
  animation:iconPop 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
}

@keyframes iconPop{
  0%{transform:scale(1)}
  50%{transform:scale(1.3)}
  100%{transform:scale(1)}
}

/* Company selectors */
.cdd-trigger{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px 14px;
  border:2px solid var(--border);
  border-radius:10px;
  background:var(--surface);
  cursor:pointer;
  transition:all 0.2s;
}
.cdd-trigger:hover{
  border-color:var(--accent2);
  box-shadow:0 2px 8px rgba(27,127,79,0.1);
}
.cdd-logo{
  width:32px;
  height:32px;
  border-radius:6px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
}

/* Upload boxes */
.upload-section{
  display:grid;
  gap:10px;
}
.upload-type-row{
  margin-bottom:0;
}
.upload-type-label{
  font-size:11px;
  font-weight:500;
  margin-bottom:6px;
  color:var(--muted);
}
.upload-boxes{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
}

.upload-box{
  min-height:90px;
  border-radius:8px;
  padding:10px;
  display:flex;
  flex-direction:column;
  text-align:center;
  transition:all 0.2s;
}

/* Green - has cache */
.upload-box.green{
  background:linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%);
  border:2px solid #22C55E;
  align-items:center;
  justify-content:center;
}

/* Red - needs upload */
.upload-box.red{
  background:linear-gradient(135deg, #FEF2F2 0%, #FEE2E2 100%);
  border:2px dashed #EF4444;
  cursor:pointer;
  align-items:center;
  justify-content:center;
}
.upload-box.red:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(239,68,68,0.2);
}

/* Yellow - stale cache */
.upload-box.yellow{
  background:linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%);
  border:2px solid #F59E0B;
  justify-content:space-between;
}

.upload-box-header{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  margin-bottom:6px;
}
.upload-box-logo{
  width:18px;
  height:18px;
  border-radius:3px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:8px;
  font-weight:700;
  color:#fff;
  flex-shrink:0;
}
.upload-box-company{
  font-size:11px;
  font-weight:600;
}

.upload-box-text{
  font-size:10px;
  font-weight:500;
  line-height:1.4;
}
.upload-box-text.green{color:#166534}
.upload-box-text.yellow{color:#92400E}
.upload-box-text.red{color:#991B1B; margin-bottom:4px}

.upload-box-subtext{
  font-size:9px;
  opacity:0.8;
}
.upload-box-subtext.red{color:#991B1B}

.upload-box-buttons{
  display:grid;
  gap:3px;
  margin-top:6px;
}
.upload-box-btn{
  width:100%;
  padding:4px;
  font-size:9px;
  font-weight:600;
  border-radius:4px;
  cursor:pointer;
  font-family:inherit;
  transition:all 0.2s;
}
.upload-box-btn.primary{
  background:#F59E0B;
  color:#fff;
  border:none;
}
.upload-box-btn.primary:hover{
  background:#D97706;
}
.upload-box-btn.secondary{
  background:var(--surface);
  color:#92400E;
  border:1.5px solid #F59E0B;
}
.upload-box-btn.secondary:hover{
  background:#F59E0B;
  color:#fff;
}

/* Analyze button */
.analyze-btn{
  width:100%;
  padding:18px;
  font-family:'Syne',sans-serif;
  font-size:17px;
  font-weight:600;
  background:linear-gradient(135deg, #1B7F4F 0%, #0F6E56 100%);
  color:#fff;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:all 0.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  box-shadow:0 4px 16px rgba(27,127,79,0.3);
  position:relative;
  overflow:hidden;
}
.analyze-btn::before{
  content:'';
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  transition:left 0.5s;
}
.analyze-btn:hover::before{
  left:100%;
}
.analyze-btn:hover{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(27,127,79,0.4);
}
.analyze-btn .arrow{
  transition:transform 0.3s;
}
.analyze-btn:hover .arrow{
  transform:translateX(4px);
}

/* Results tabs */
.results-section{
  display:none;
  margin-top:1.5rem;
}
.results-section.show{
  display:block;
}

.tabs{
  display:flex;
  gap:4px;
  margin-bottom:1rem;
  border-bottom:2px solid var(--border);
  padding-bottom:0;
}
.tab{
  padding:10px 16px;
  font-size:13px;
  font-weight:500;
  background:transparent;
  color:var(--muted);
  border:none;
  cursor:pointer;
  border-radius:8px 8px 0 0;
  transition:all 0.2s;
}
.tab:hover{
  background:var(--bg);
}
.tab.active{
  background:#1B7F4F;
  color:#fff;
}

.tab-content{
  padding:1rem;
  background:var(--bg);
  border-radius:8px;
  font-size:13px;
  color:var(--muted);
  text-align:center;
}

/* Toast notification */
.toast{
  position:fixed;
  top:20px;
  right:20px;
  background:linear-gradient(135deg, #1B7F4F 0%, #0F6E56 100%);
  color:#fff;
  padding:16px 24px;
  border-radius:12px;
  box-shadow:0 8px 24px rgba(27,127,79,0.4);
  display:flex;
  align-items:center;
  gap:12px;
  font-size:14px;
  font-weight:500;
  transform:translateX(400px);
  transition:transform 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  z-index:1000;
}
.toast.show{
  transform:translateX(0);
}

/* Loading skeleton */
.skeleton{
  background:linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size:200% 100%;
  animation:loading 1.5s ease-in-out infinite;
  border-radius:8px;
}
@keyframes loading{
  0%{background-position:200% 0}
  100%{background-position:-200% 0}
}
</style>
</head>
<body>

<div class="card">
  <div class="section-lbl">1. Forsikringstyper <span style="font-weight:400;opacity:0.7">(vælg op til 5)</span></div>
  <div class="type-grid">
    <button class="type-btn" data-type="bil" onclick="toggleType(this)">
      <span class="type-icon">🚗</span>Bil
    </button>
    <button class="type-btn" data-type="hund" onclick="toggleType(this)">
      <span class="type-icon">🐶</span>Hund
    </button>
    <button class="type-btn" data-type="indbo" onclick="toggleType(this)">
      <span class="type-icon">🏠</span>Indbo
    </button>
    <button class="type-btn" data-type="hus" onclick="toggleType(this)">
      <span class="type-icon">🏡</span>Hus
    </button>
    <button class="type-btn" data-type="ulykke" onclick="toggleType(this)">
      <span class="type-icon">🩹</span>Ulykke
    </button>
    <button class="type-btn" data-type="rejse" onclick="toggleType(this)">
      <span class="type-icon">✈️</span>Rejse
    </button>
  </div>
</div>

<div class="card">
  <div class="section-lbl">2. Vælg selskaber</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500">Dit selskab</div>
      <div class="cdd-trigger">
        <div class="cdd-logo" style="background:#00AEEF">AB</div>
        <span style="font-size:14px;flex:1">Alm. Brand</span>
      </div>
    </div>
    <div>
      <div style="font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500">Kundens selskab</div>
      <div class="cdd-trigger">
        <div class="cdd-logo" style="background:#2E8B2E">GF</div>
        <span style="font-size:14px;flex:1">GF Forsikring</span>
      </div>
    </div>
  </div>
</div>

<div class="card" id="upload-section" style="display:none">
  <div class="section-lbl">3. Upload betingelser</div>
  <div class="upload-section" id="upload-container">
    <!-- Dynamic upload boxes will be inserted here -->
  </div>
</div>

<button class="analyze-btn" id="analyze-btn" onclick="analyze()">
  <span id="analyze-text">Vælg forsikringstyper for at starte</span>
  <span class="arrow">→</span>
</button>

<!-- Results section (hidden initially) -->
<div class="card results-section" id="results-section">
  <div class="section-lbl">Analyse resultat</div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab(0)">Samlet overblik</button>
    <button class="tab" onclick="switchTab(1)">Dækningsoversigt</button>
    <button class="tab" onclick="switchTab(2)">Salgspitch</button>
    <button class="tab" onclick="switchTab(3)">Send til kunde</button>
  </div>
  <div class="tab-content" id="tab-content">
    Her vises dine analyseresultater efter du har klikket på "Analysér"
  </div>
</div>

<!-- Toast notification -->
<div class="toast" id="toast">
  <span id="toast-text"></span>
</div>

<script>
// State
let selectedTypes = new Set();
let uploadedFiles = {};

// Mock cache data - In production, this would come from Supabase
const cacheData = {
  'bil-almbrand': { age_days: 3, status: 'fresh' },
  'bil-gf': null,
  'hund-almbrand': null,
  'hund-gf': null,
  'indbo-almbrand': { age_days: 10, status: 'stale' },
  'indbo-gf': { age_days: 2, status: 'fresh' },
  'hus-almbrand': null,
  'hus-gf': null,
  'ulykke-almbrand': { age_days: 5, status: 'fresh' },
  'ulykke-gf': { age_days: 12, status: 'stale' },
  'rejse-almbrand': null,
  'rejse-gf': null
};

const typeLabels = {
  bil: '🚗 Bil',
  hund: '🐶 Hund',
  indbo: '🏠 Indbo',
  hus: '🏡 Hus',
  ulykke: '🩹 Ulykke',
  rejse: '✈️ Rejse'
};

const companies = [
  { id: 'almbrand', name: 'Alm. Brand', logo: 'AB', color: '#00AEEF' },
  { id: 'gf', name: 'GF Forsikring', logo: 'GF', color: '#2E8B2E' }
];

function toggleType(btn) {
  const type = btn.dataset.type;
  
  if (selectedTypes.has(type)) {
    if (selectedTypes.size === 1) {
      showToast('⚠️ Du skal vælge mindst én forsikringstype');
      return;
    }
    selectedTypes.delete(type);
    btn.classList.remove('selected');
  } else {
    if (selectedTypes.size >= 5) {
      showToast('⚠️ Maksimum 5 forsikringstyper');
      return;
    }
    selectedTypes.add(type);
    btn.classList.add('selected');
  }
  
  updateUI();
}

function updateUI() {
  const uploadSection = document.getElementById('upload-section');
  const uploadContainer = document.getElementById('upload-container');
  const analyzeBtn = document.getElementById('analyze-btn');
  const analyzeText = document.getElementById('analyze-text');
  
  if (selectedTypes.size === 0) {
    uploadSection.style.display = 'none';
    analyzeText.textContent = 'Vælg forsikringstyper for at starte';
    return;
  }
  
  uploadSection.style.display = 'block';
  
  // Build upload boxes
  let html = '';
  const types = Array.from(selectedTypes);
  
  types.forEach(type => {
    html += `
      <div class="upload-type-row">
        <div class="upload-type-label">${typeLabels[type]}</div>
        <div class="upload-boxes">
    `;
    
    companies.forEach(company => {
      const cacheKey = `${type}-${company.id}`;
      const cache = cacheData[cacheKey];
      
      html += renderUploadBox(type, company, cache);
    });
    
    html += `
        </div>
      </div>
    `;
  });
  
  uploadContainer.innerHTML = html;
  
  // Update analyze button text
  const needsUpload = countNeedsUpload();
  const hasFresh = countFresh();
  
  if (needsUpload === 0) {
    analyzeText.textContent = 'Generer salgspitch fra eksisterende analyser';
  } else if (hasFresh > 0) {
    analyzeText.textContent = `Analysér ${needsUpload} ny${needsUpload > 1 ? 'e' : ''} + brug ${hasFresh} eksisterende`;
  } else {
    analyzeText.textContent = `Analysér ${needsUpload} forsikring${needsUpload > 1 ? 'er' : ''}`;
  }
}

function renderUploadBox(type, company, cache) {
  const cacheKey = `${type}-${company.id}`;
  
  if (!cache) {
    // Red - needs upload
    return `
      <div class="upload-box red" onclick="handleUploadClick('${cacheKey}')">
        <div>
          <div class="upload-box-header">
            <div class="upload-box-logo" style="background:${company.color}">${company.logo}</div>
            <span class="upload-box-company">${company.name}</span>
          </div>
          <div class="upload-box-text red">Upload nye betingelser</div>
          <div class="upload-box-subtext red">Klik eller træk PDF hertil</div>
        </div>
      </div>
    `;
  } else if (cache.age_days <= 7) {
    // Green - fresh cache
    return `
      <div class="upload-box green">
        <div>
          <div class="upload-box-header">
            <div class="upload-box-logo" style="background:${company.color}">${company.logo}</div>
            <span class="upload-box-company">${company.name}</span>
          </div>
          <div class="upload-box-text green">✓ Uploadet for ${cache.age_days} dag${cache.age_days === 1 ? '' : 'e'} siden</div>
        </div>
      </div>
    `;
  } else {
    // Yellow - stale cache
    return `
      <div class="upload-box yellow">
        <div>
          <div class="upload-box-header">
            <div class="upload-box-logo" style="background:${company.color}">${company.logo}</div>
            <span class="upload-box-company">${company.name}</span>
          </div>
          <div class="upload-box-text yellow">⚠️ Uploadet for ${cache.age_days} dage siden</div>
        </div>
        <div class="upload-box-buttons">
          <button class="upload-box-btn secondary" onclick="useExisting('${cacheKey}')">Brug eksisterende</button>
          <button class="upload-box-btn primary" onclick="handleUploadClick('${cacheKey}')">Upload nye</button>
        </div>
      </div>
    `;
  }
}

function countNeedsUpload() {
  let count = 0;
  selectedTypes.forEach(type => {
    companies.forEach(company => {
      const cache = cacheData[`${type}-${company.id}`];
      if (!cache) count++;
    });
  });
  return count;
}

function countFresh() {
  let count = 0;
  selectedTypes.forEach(type => {
    companies.forEach(company => {
      const cache = cacheData[`${type}-${company.id}`];
      if (cache && cache.age_days <= 7) count++;
    });
  });
  return count;
}

function handleUploadClick(cacheKey) {
  showToast('📄 Upload PDF funktionalitet kommer her');
  console.log('Upload clicked for:', cacheKey);
  // In production: Open file picker or handle drag/drop
}

function useExisting(cacheKey) {
  showToast('✓ Bruger eksisterende analyse');
  console.log('Using existing for:', cacheKey);
}

function analyze() {
  if (selectedTypes.size === 0) {
    showToast('⚠️ Vælg mindst én forsikringstype');
    return;
  }
  
  // Show loading state
  const analyzeBtn = document.getElementById('analyze-btn');
  const analyzeText = document.getElementById('analyze-text');
  const originalText = analyzeText.textContent;
  
  analyzeText.textContent = 'Analyserer...';
  analyzeBtn.style.opacity = '0.6';
  analyzeBtn.style.cursor = 'wait';
  
  // Simulate analysis
  setTimeout(() => {
    analyzeText.textContent = originalText;
    analyzeBtn.style.opacity = '1';
    analyzeBtn.style.cursor = 'pointer';
    
    // Show results
    document.getElementById('results-section').classList.add('show');
    document.getElementById('results-section').scrollIntoView({ behavior: 'smooth' });
    
    showToast('✓ Analyse gennemført!');
  }, 2000);
}

function switchTab(index) {
  const tabs = document.querySelectorAll('.tab');
  const content = document.getElementById('tab-content');
  
  tabs.forEach((tab, i) => {
    if (i === index) {
      tab.classList.add('active');
    } else {
      tab.classList.remove('active');
    }
  });
  
  const tabNames = ['Samlet overblik', 'Dækningsoversigt', 'Salgspitch', 'Send til kunde'];
  content.innerHTML = `Indhold for fanen "${tabNames[index]}" vises her efter analyse`;
}

function showToast(text) {
  const toast = document.getElementById('toast');
  const toastText = document.getElementById('toast-text');
  
  toastText.textContent = text;
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 3000);
}

// Initialize
updateUI();
</script>

</body>
</html>
