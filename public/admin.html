<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IQSales — Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#F4F3EF;--surface:#fff;--border:#E3E1D9;--text:#141412;--muted:#7A7870;--accent:#0A2540;--accent2:#1B7F4F;--accent-light:#E6F2EC;--danger:#B91C1C;--r:14px;--rs:8px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--accent);padding:0 2rem;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-brand{font-family:'Syne',sans-serif;font-size:18px;color:#fff;display:flex;align-items:center;gap:8px}
.nav-brand span{font-size:11px;color:rgba(255,255,255,.5);font-family:'DM Sans',sans-serif}
.nav-right{display:flex;align-items:center;gap:12px}
.btn-back{color:rgba(255,255,255,.7);text-decoration:none;font-size:13px;padding:6px 12px;border-radius:6px;transition:background .15s}
.btn-back:hover{background:rgba(255,255,255,.1);color:#fff}
.btn-logout{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:6px;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif}
.container{max-width:1000px;margin:0 auto;padding:2rem 1.5rem}
.page-title{font-family:'Syne',sans-serif;font-size:26px;color:var(--accent);margin-bottom:4px}
.page-sub{font-size:13px;color:var(--muted);margin-bottom:2rem}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);margin-bottom:1.5rem;overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.card-header h2{font-size:15px;font-weight:600}
.card-header p{font-size:12px;color:var(--muted);margin-top:2px}
.card-body{padding:20px}
.form-row{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end}
label{display:block;font-size:12px;font-weight:600;margin-bottom:5px}
input,select{width:100%;font-family:'DM Sans',sans-serif;font-size:13px;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);background:#fff;color:var(--text);outline:none}
input:focus,select:focus{border-color:var(--accent2)}
.btn-primary{padding:9px 18px;background:var(--accent2);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-danger{padding:5px 10px;background:transparent;color:var(--danger);border:1px solid #FECACA;border-radius:6px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-danger:hover{background:#FEF2F2}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border);background:#FAFAFA}
td{padding:12px 16px;font-size:13px;border-bottom:1px solid #F3F4F6}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAFA}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.badge-admin{background:#FEF3C7;color:#92400E}
.badge-seller{background:#ECFDF5;color:#065F46}
.empty{text-align:center;padding:3rem;color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;right:20px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:500;box-shadow:0 4px 16px rgba(0,0,0,.12);transform:translateY(60px);opacity:0;transition:all .3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.toast.ok{background:#F0FDF4;color:#166534;border:1px solid #BBF7D0}
.toast.err{background:#FEF2F2;color:#991B1B;border:1px solid #FECACA}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:14px;padding:1.5rem;width:440px;max-width:90vw;border:1px solid var(--border)}
.modal h3{font-size:16px;font-weight:600;margin-bottom:4px}
.modal p{font-size:12px;color:var(--muted);margin-bottom:1.25rem}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.modal-grid .full{grid-column:1/-1}
.modal-actions{display:flex;gap:8px;margin-top:1rem}
.btn-save{flex:1;padding:9px;background:var(--accent2);color:#fff;border:none;border-radius:var(--rs);font-size:13px;font-weight:500;font-family:"DM Sans",sans-serif;cursor:pointer}
.btn-cancel{padding:9px 16px;background:transparent;border:1.5px solid var(--border);border-radius:var(--rs);font-size:13px;cursor:pointer;font-family:"DM Sans",sans-serif;color:var(--muted)}
.btn-edit{padding:5px 10px;background:transparent;color:var(--accent2);border:1px solid #A7D7B8;border-radius:6px;font-size:12px;cursor:pointer;font-family:"DM Sans",sans-serif;margin-right:4px}
.btn-edit:hover{background:var(--accent-light)}
</style>
</head>
<body>
<nav>
  <div class="nav-brand">⚡ IQSales <span>Admin</span></div>
  <div class="nav-right">
    <a href="/" class="btn-back">← Tilbage til app</a>
    <button class="btn-logout" onclick="logout()">Log ud</button>
  </div>
</nav>

<div class="container">
  <div class="page-title">Brugerstyring</div>
  <div class="page-sub">Opret og administrer adgang til IQSales</div>

  <div class="card">
    <div class="card-header">
      <div><h2>Inviter ny bruger</h2><p>Brugeren oprettes med det kodeord du angiver</p></div>
    </div>
    <div class="card-body">
      <div class="form-row">
        <div><label>Fulde navn</label><input type="text" id="inv-name" placeholder="Fornavn Efternavn"></div>
        <div><label>Email</label><input type="email" id="inv-email" placeholder="navn@selskab.dk"></div>
        <div><label>Afdeling</label>
          <select id="inv-dept">
            <option value="">Vælg afdeling</option>
            <option>Direkte Salg Privat Vest</option>
            <option>Direkte Salg Privat Midt</option>
            <option>Direkte Salg Privat Øst</option>
            <option>Direkte Salg Privat Online</option>
            <option>Direkte Salg Privat Sydbank Vest</option>
            <option>Direkte Salg Privat Sydbank Øst</option>
            <option>Salgscenter Codan</option>
            <option>Salgscenter Alm Brand</option>
            <option>Mødebooking</option>
            <option>Ledelsen</option>
          </select>
        </div>
        <button class="btn-primary" id="inv-btn" onclick="inviteUser()">Opret bruger</button>
      </div>
      <div id="inv-pw-row" style="margin-top:10px;display:none">
        <label>Midlertidigt kodeord</label>
        <input type="text" id="inv-pw" placeholder="Mindst 6 tegn">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-header"><div><h2>Alle brugere</h2><p id="user-count">Indlæser...</p></div></div>
    <table>
      <thead><tr><th>Navn</th><th>Email</th><th>Afdeling</th><th>Rolle</th><th>Oprettet</th><th></th></tr></thead>
      <tbody id="user-table"><tr><td colspan="6"><div class="empty">Indlæser...</div></td></tr></tbody>
    </table>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="edit-modal-bg">
  <div class="modal">
    <h3>Rediger bruger</h3>
    <p id="edit-modal-email-label"></p>
    <input type="hidden" id="edit-id">
    <div class="modal-grid">
      <div><label>Fulde navn</label><input type="text" id="edit-name"></div>
      <div><label>Email</label><input type="email" id="edit-email"></div>
      <div><label>Afdeling</label>
        <select id="edit-dept">
          <option value="">Ingen afdeling</option>
          <option>Direkte Salg Privat Vest</option>
          <option>Direkte Salg Privat Midt</option>
          <option>Direkte Salg Privat Øst</option>
          <option>Direkte Salg Privat Online</option>
          <option>Direkte Salg Privat Sydbank Vest</option>
          <option>Direkte Salg Privat Sydbank Øst</option>
          <option>Salgscenter Codan</option>
          <option>Salgscenter Alm Brand</option>
          <option>Mødebooking</option>
          <option>Ledelsen</option>
        </select>
      </div>
      <div><label>Rolle</label>
        <select id="edit-role">
          <option value="seller">Sælger</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div class="full"><label>Nyt kodeord <span style="font-weight:400;color:var(--muted)">(lad stå tomt for at beholde)</span></label><input type="text" id="edit-pw" placeholder="Mindst 6 tegn"></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeEdit()">Annuller</button>
      <button class="btn-save" onclick="saveEdit()">Gem ændringer</button>
    </div>
  </div>
</div>

<script>
const URL = 'https://pnzpdgjstzuapgknagsa.supabase.co';
const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBuenBkZ2pzdHp1YXBna25hZ3NhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4ODM1MDUsImV4cCI6MjA5MjQ1OTUwNX0.sZzAvYGS3ks2mn11SAu704Ciq1Ij-s8RnN7paYipnuY';

function getToken(){
  try{
    const raw=localStorage.getItem('sb-pnzpdgjstzuapgknagsa-auth-token');
    if(raw)return JSON.parse(raw).access_token;
  }catch(e){}
  return null;
}

async function init(){
  const token=getToken();
  if(!token){window.location.href='/login.html';return;}
  await loadUsers();
  document.getElementById('inv-pw-row').style.display='block';
}

async function loadUsers(){
  const token=getToken();
  const res=await fetch(URL+'/rest/v1/profiles?select=*&order=created_at.desc',{
    headers:{'apikey':KEY,'Authorization':'Bearer '+token}
  });
  const profiles=await res.json();
  if(!Array.isArray(profiles)||profiles.length===0){
    document.getElementById('user-table').innerHTML='<tr><td colspan="6"><div class="empty">Ingen brugere fundet</div></td></tr>';
    document.getElementById('user-count').textContent='0 brugere';
    return;
  }
  document.getElementById('user-count').textContent=profiles.length+' bruger'+(profiles.length!==1?'e':'');
  document.getElementById('user-table').innerHTML=profiles.map(p=>`
    <tr>
      <td><strong>${p.full_name||'—'}</strong></td>
      <td style="color:var(--muted)">${p.email||'—'}</td>
      <td>${p.department||'—'}</td>
      <td><span class="badge badge-${p.role}">${p.role==='admin'?'Admin':'Sælger'}</span></td>
      <td style="color:var(--muted);font-size:12px">${p.created_at?new Date(p.created_at).toLocaleDateString('da-DK',{day:'numeric',month:'short',year:'numeric'}):''}</td>
      <td>
        <button class="btn-edit" onclick="openEdit('${p.id}','${(p.full_name||'').replace(/'/g,"\'")}','${(p.email||'').replace(/'/g,"\'")}','${(p.department||'').replace(/'/g,"\'")}','${p.role||'seller'}')">Rediger</button>
        <button class="btn-danger" onclick="deleteUser('${p.id}','${(p.full_name||p.email||'').replace(/'/g,"\'")}')">Slet</button>
      </td>
    </tr>`).join('');
}

async function inviteUser(){
  const name=document.getElementById('inv-name').value.trim();
  const email=document.getElementById('inv-email').value.trim();
  const dept=document.getElementById('inv-dept').value;
  const pw=document.getElementById('inv-pw').value.trim();
  const btn=document.getElementById('inv-btn');
  if(!name||!email||!pw){toast('Udfyld navn, email og kodeord','err');return;}
  if(pw.length<6){toast('Kodeord skal være mindst 6 tegn','err');return;}
  btn.disabled=true;btn.textContent='Opretter...';
  try{
    const res=await fetch('/api/create-user',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+getToken()},
      body:JSON.stringify({email,password:pw,full_name:name,department:dept||null,role:'seller'})
    });
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Fejl');
    toast('✓ '+name+' er oprettet','ok');
    document.getElementById('inv-name').value='';
    document.getElementById('inv-email').value='';
    document.getElementById('inv-pw').value='';
    document.getElementById('inv-dept').value='';
    await loadUsers();
  }catch(e){toast('Fejl: '+e.message,'err');}
  btn.disabled=false;btn.textContent='Opret bruger';
}

async function deleteUser(id,name){
  if(!confirm('Slet '+name+'? Brugeren mister adgang.'))return;
  await fetch(URL+'/rest/v1/profiles?id=eq.'+id,{method:'DELETE',headers:{'apikey':KEY,'Authorization':'Bearer '+getToken()}});
  toast(name+' er slettet','ok');
  await loadUsers();
}

function logout(){
  localStorage.removeItem('sb-pnzpdgjstzuapgknagsa-auth-token');
  window.location.href='/login.html';
}

function toast(msg,type){
  const t=document.getElementById('toast');
  t.textContent=msg;t.className='toast '+type+' show';
  setTimeout(()=>t.classList.remove('show'),3000);
}

function openEdit(id, name, email, dept, role){
  document.getElementById('edit-id').value=id;
  document.getElementById('edit-name').value=name;
  document.getElementById('edit-email').value=email;
  document.getElementById('edit-dept').value=dept||'';
  document.getElementById('edit-role').value=role||'seller';
  document.getElementById('edit-pw').value='';
  document.getElementById('edit-modal-email-label').textContent=email;
  document.getElementById('edit-modal-bg').classList.add('open');
}

function closeEdit(){
  document.getElementById('edit-modal-bg').classList.remove('open');
}

async function saveEdit(){
  const id=document.getElementById('edit-id').value;
  const name=document.getElementById('edit-name').value.trim();
  const email=document.getElementById('edit-email').value.trim();
  const dept=document.getElementById('edit-dept').value;
  const role=document.getElementById('edit-role').value;
  const pw=document.getElementById('edit-pw').value.trim();
  if(!name||!email){toast('Navn og email er påkrævet','err');return;}
  const token=getToken();
  // Upsert profile (create if missing, update if exists)
  const r=await fetch(URL+'/rest/v1/profiles',{
    method:'POST',
    headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+token,'Prefer':'resolution=merge-duplicates,return=minimal'},
    body:JSON.stringify({id:id,full_name:name,email:email,department:dept||null,role:role})
  });
  if(!r.ok){toast('Kunne ikke opdatere profil','err');return;}
  // Update password if provided
  if(pw){
    if(pw.length<6){toast('Kodeord skal være mindst 6 tegn','err');return;}
    await fetch(URL+'/auth/v1/admin/users/'+id,{
      method:'PUT',
      headers:{'Content-Type':'application/json','apikey':KEY,'Authorization':'Bearer '+token},
      body:JSON.stringify({password:pw})
    });
  }
  toast('✓ Bruger opdateret','ok');
  closeEdit();
  await loadUsers();
}

init();
</script>
</body>
</html>
